<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>M4 AR-Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .card { border: 1px solid #004400; background: rgba(5, 5, 5, 0.9); transition: 0.3s; backdrop-filter: blur(5px); }
        .card:hover { border-color: #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.3); transform: translateY(-5px); }
        .bug-tag { color: #ff0055; font-weight: bold; border: 1px solid #ff0055; padding: 0 4px; border-radius: 4px; background: rgba(255,0,85,0.1); }
        .focus-tag { color: #ffaa00; text-decoration: underline; font-weight: bold; }
        .keyword-tag { color: #00e5ff; font-style: italic; }
    </style>
</head>
<body class="p-8">
    <canvas id="matrix"></canvas>
    <h1 class="text-3xl font-bold mb-8 border-b border-green-900 pb-4 flex items-center gap-3">
        <span class="glitch">👁️</span> M4 视觉审计系统 <span class="text-xs font-normal text-green-800">v3.0_DEBUG_MODE</span>
    </h1>
    <div id="logs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        async function fetchLogs() {
            const user = 'go2sun'; const repo = 'm4-audit-logs';
            const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
            const files = await response.json();
            const container = document.getElementById('logs');
            const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name.startsWith('AR_Audit_')).reverse();

            for (const file of mdFiles) {
                const res = await fetch(file.download_url);
                const text = await res.text();
                const imgMatch = text.match(/!\[Screenshot\]\(\.\/screenshots\/(.*?)\)/);
                const imgUrl = imgMatch ? `./screenshots/${imgMatch[1]}` : '';
                
                let analysis = text.split('\n').filter(line => line.trim() !== '' && !line.startsWith('#') && !line.startsWith('!'))[0] || "";

                // 高亮处理逻辑
                analysis = analysis
                    .replace(/BUG:(.*?)(?=FOCUS:|KEYWORDS:|$)/gi, '<span class="bug-tag">❌ BUG: </span>')
                    .replace(/FOCUS:(.*?)(?=BUG:|KEYWORDS:|$)/gi, '<span class="focus-tag">🎯 FOCUS: </span>')
                    .replace(/KEYWORDS:(.*?)(?=BUG:|FOCUS:|$)/gi, '<span class="keyword-tag">🔑 </span>');

                const card = document.createElement('div');
                card.className = 'card p-6 rounded-xl';
                card.innerHTML = `
                    <div class="text-[10px] text-green-900 mb-3 font-bold">${file.name}</div>
                    ${imgUrl ? `<img src="${imgUrl}" class="w-full h-44 object-cover rounded border border-green-900 mb-4 bg-black">` : ''}
                    <div class="text-sm leading-relaxed text-green-400">${analysis}</div>
                `;
                container.appendChild(card);
            }
        }
        fetchLogs();
    </script>
</body>
</html>
