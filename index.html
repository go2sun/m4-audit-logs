<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>M4 AR-Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
        .card { border: 1px solid #333; background: rgba(20,20,20,0.8); }
    </style>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-8 border-b border-green-900 pb-2">👁️ M4 视觉审计看板</h1>
    <div id="logs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    <script>
        async function fetchLogs() {
            const user = 'go2sun';
            const repo = 'm4-audit-logs';
            const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
            const files = await response.json();
            const container = document.getElementById('logs');
            files.filter(f => f.name.endsWith('.md') && f.name.startsWith('AR_Audit_')).reverse().forEach(async file => {
                const res = await fetch(file.download_url);
                const text = await res.text();
                const card = document.createElement('div');
                card.className = 'card p-4 rounded-lg';
                card.innerHTML = `<div class="text-xs text-gray-500 mb-2">${file.name}</div><div class="text-sm">${text.split('\n\n')[1] || "解析中..."}</div>`;
                container.appendChild(card);
            });
        }
        fetchLogs();
    </script>
</body>
</html>
