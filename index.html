<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>M4 AR-Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .card { border: 1px solid #004400; background: #050505; transition: 0.3s; }
        .card:hover { border-color: #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-8 border-b border-green-900 pb-4">👁️ M4 视觉审计系统</h1>
    <div id="logs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <script>
        async function fetchLogs() {
            const user = 'go2sun';
            const repo = 'm4-audit-logs';
            const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
            const files = await response.json();
            const container = document.getElementById('logs');
            
            // 找出所有审计文件
            const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name.startsWith('AR_Audit_')).reverse();

            for (const file of mdFiles) {
                const res = await fetch(file.download_url);
                const text = await res.text();
                
                // 提取图片文件名和 AI 分析内容
                const imgMatch = text.match(/!\[Screenshot\]\(\.\/screenshots\/(.*?)\)/);
                const imgUrl = imgMatch ? `./screenshots/${imgMatch[1]}` : '';
                const analysis = text.split('\n\n')[2] || "分析结晶中...";
                
                const card = document.createElement('div');
                card.className = 'card p-6 rounded-xl';
                card.innerHTML = `
                    <div class="text-[10px] text-green-800 mb-3 uppercase tracking-widest">${file.name}</div>
                    ${imgUrl ? `<img src="${imgUrl}" class="w-full h-48 object-cover rounded border border-green-900 mb-4" onerror="this.style.display='none'">` : ''}
                    <p class="text-sm leading-relaxed text-green-400">${analysis}</p>
                    <div class="mt-4 text-[9px] text-green-900">SYSTEM: M4_RETINA_DISTILLATION_COMPLETE</div>
                `;
                container.appendChild(card);
            }
        }
        fetchLogs();
    </script>
</body>
</html>
