<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>M4 AR-Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .card { border: 1px solid #004400; background: rgba(5, 5, 5, 0.9); transition: 0.3s; backdrop-filter: blur(5px); }
        .card:hover { border-color: #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.3); transform: translateY(-5px); }
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-8">
    <canvas id="matrix"></canvas>
    <h1 class="text-3xl font-bold mb-8 border-b border-green-900 pb-4 flex items-center gap-3">
        <span class="glitch">👁️</span> M4 视觉审计系统 
        <span class="text-xs font-normal text-green-800 tracking-widest">v2.0_MATRIX_LINK</span>
    </h1>
    <div id="logs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <script>
        // --- 数字雨背景逻辑 ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- 数据渲染逻辑 ---
        async function fetchLogs() {
            const user = 'go2sun';
            const repo = 'm4-audit-logs';
            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
                const files = await response.json();
                const container = document.getElementById('logs');
                const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name.startsWith('AR_Audit_')).reverse();

                for (const file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    
                    // 解析图片路径：从 ![Screenshot](./screenshots/xxx.jpg) 提取
                    const imgMatch = text.match(/!\[Screenshot\]\(\.\/screenshots\/(.*?)\)/);
                    const imgUrl = imgMatch ? `./screenshots/${imgMatch[1]}` : '';
                    // 提取 AI 分析内容（跳过第一行标题）
                    const analysis = text.split('\n').filter(line => line.trim() !== '' && !line.startsWith('#') && !line.startsWith('!'))[0] || "数据蒸馏中...";
                    
                    const card = document.createElement('div');
                    card.className = 'card p-6 rounded-xl';
                    card.innerHTML = `
                        <div class="text-[10px] text-green-900 mb-3 uppercase tracking-tighter font-bold">${file.name}</div>
                        ${imgUrl ? `<img src="${imgUrl}" class="w-full h-44 object-cover rounded border border-green-900 mb-4 bg-black" onerror="this.src='https://via.placeholder.com/400x200?text=IMAGE_LOADING...'">` : ''}
                        <p class="text-sm leading-relaxed text-green-400 font-medium">${analysis}</p>
                        <div class="mt-4 pt-3 border-t border-green-950 text-[9px] text-green-900 flex justify-between">
                            <span>STATUS: SYNCED</span>
                            <span>M4_CORE_V3</span>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (e) { console.error("Link Error", e); }
        }
        fetchLogs();
    </script>
</body>
</html>
